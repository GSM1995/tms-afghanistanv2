{% extends "base.html" %}

{% block title %}{% if vehicle %}ویرایش خودرو{% else %}افزودن خودرو جدید{% endif %}{% endblock %}

{% block content %}
<div class="form-card">
    <h2>{% if vehicle %}✏️ ویرایش خودرو{% else %}➕ افزودن خودرو جدید{% endif %}</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>شماره پلاک</label>
            <input type="text" name="plate_number" value="{{ vehicle.plate_number|default:'' }}" required>
        </div>
        <div class="form-group">
            <label>مدل</label>
            <input type="text" name="model" value="{{ vehicle.model|default:'' }}" required>
        </div>
        <div class="form-group">
            <label>ظرفیت (تن)</label>
            <input type="number" step="0.01" name="capacity" value="{{ vehicle.capacity|default:0 }}">
        </div>
        <div class="form-group">
            <label>راننده فعلی</label>
            <select name="current_driver">
                <option value="">-----</option>
                {% for driver in drivers %}
                <option value="{{ driver.id }}" {% if vehicle.current_driver.id == driver.id %}selected{% endif %}>
                    {{ driver.first_name }} {{ driver.last_name }}
                </option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>
                <input type="checkbox" name="is_available" {% if vehicle.is_available %}checked{% endif %}> در دسترس
            </label>
        </div>
        <button type="submit" class="btn btn-primary">💾 ذخیره</button>
        <a href="/admin/vehicles/" class="btn btn-danger">↩️ انصراف</a>
    </form>
</div>
{% endblock %}
