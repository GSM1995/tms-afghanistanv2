{% extends "base.html" %}

{% block title %}{% if driver %}ویرایش راننده{% else %}افزودن راننده جدید{% endif %}{% endblock %}

{% block content %}
<div class="form-card">
    <h2>{% if driver %}✏️ ویرایش راننده{% else %}➕ افزودن راننده جدید{% endif %}</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>نام</label>
            <input type="text" name="first_name" value="{{ driver.first_name|default:'' }}" required>
        </div>
        <div class="form-group">
            <label>نام خانوادگی</label>
            <input type="text" name="last_name" value="{{ driver.last_name|default:'' }}" required>
        </div>
        <div class="form-group">
            <label>کد ملی</label>
            <input type="text" name="national_code" value="{{ driver.national_code|default:'' }}" required>
        </div>
        <div class="form-group">
            <label>شماره گواهینامه</label>
            <input type="text" name="license_number" value="{{ driver.license_number|default:'' }}">
        </div>
        <div class="form-group">
            <label>موبایل</label>
            <input type="text" name="phone" value="{{ driver.phone|default:'' }}">
        </div>
        <div class="form-group">
            <label>
                <input type="checkbox" name="is_active" {% if driver.is_active %}checked{% endif %}> فعال
            </label>
        </div>
        <button type="submit" class="btn btn-primary">💾 ذخیره</button>
        <a href="/admin/drivers/" class="btn btn-danger">↩️ انصراف</a>
    </form>
</div>
{% endblock %}
